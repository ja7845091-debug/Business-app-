<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Govt HSS Kaghan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Very light background */
        }
        
        /* Custom Checkbox Styles to match PakEducate */
        .status-box {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }
        .status-box svg {
            display: none; /* Hide tick by default */
            width: 18px;
            height: 18px;
        }
        
        /* Active States */
        .status-box.active svg { display: block; }
        
        .present.active { background-color: #ecfdf5; border-color: #10b981; color: #10b981; }
        .absent.active { background-color: #fef2f2; border-color: #ef4444; color: #ef4444; }
        .late.active { background-color: #fffbeb; border-color: #f59e0b; color: #f59e0b; }
        .leave.active { background-color: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-100 px-4 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            <span class="font-semibold text-lg tracking-tight">Govt HSS Kaghan</span>
        </div>
        <div class="flex items-center gap-4">
            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </div>
    </nav>

    <div class="px-5 mt-6">
        <h1 class="text-3xl font-bold text-slate-900">Attendance</h1>
        <p class="text-slate-500 mt-1 text-sm">Daily attendance management</p>

        <div class="flex bg-slate-100 p-1 rounded-xl mt-6 w-max">
            <button class="px-5 py-2 text-sm font-semibold bg-white shadow-sm rounded-lg text-slate-800">Mark Attendance</button>
            <button class="px-5 py-2 text-sm font-semibold text-slate-500 rounded-lg hover:text-slate-700">Report</button>
        </div>

        <div class="mt-6 flex flex-col gap-4">
            <select class="w-full bg-white border border-slate-200 text-slate-700 rounded-xl px-4 py-3 outline-none focus:border-slate-400 appearance-none">
                <option value="">Select Class</option>
                <option value="6th">Class 6th</option>
                <option value="7th">Class 7th</option>
                <option value="8th">Class 8th</option>
            </select>
            
            <input type="date" value="2026-03-18" class="w-full sm:w-1/2 bg-white border border-blue-200 text-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-400">
        </div>

        <div class="mt-8 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-wrap gap-2 mb-6">
                <span class="text-sm text-slate-500 flex items-center mr-2">Quick:</span>
                <button class="px-4 py-2 bg-green-50 text-green-600 font-semibold text-sm rounded-lg">All Present</button>
                <button class="px-4 py-2 bg-red-50 text-red-600 font-semibold text-sm rounded-lg">All Absent</button>
                <button class="px-4 py-2 bg-yellow-50 text-yellow-600 font-semibold text-sm rounded-lg">All Late</button>
                <button class="px-4 py-2 bg-blue-50 text-blue-600 font-semibold text-sm rounded-lg">All Leave</button>
            </div>

            <button class="w-full sm:w-auto px-6 py-3 bg-slate-500 text-white font-semibold rounded-xl mb-6 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Save Attendance
            </button>

            <div class="flex text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">
                <div class="flex-1">Student Name</div>
                <div class="flex gap-4 sm:gap-6 justify-end pr-2">
                    <span class="text-green-500 w-8 text-center">P</span>
                    <span class="text-red-500 w-8 text-center">A</span>
                    <span class="text-yellow-500 w-8 text-center">L</span>
                    <span class="text-blue-500 w-8 text-center">Lv</span>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                
                <div class="flex items-center justify-between border-b border-slate-50 pb-3">
                    <div class="flex items-center gap-3">
                        <div class="text-xs font-bold text-slate-300 w-4">1</div>
                        <div>
                            <h3 class="text-sm font-semibold text-slate-800">Jawad Ahmad</h3>
                            <p class="text-[11px] text-slate-400">Sajjad Ahmad</p>
                        </div>
                    </div>
                    <div class="flex gap-2 sm:gap-4">
                        <div class="status-box present active" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box absent" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box late" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box leave" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    </div>
                </div>

                <div class="flex items-center justify-between border-b border-slate-50 pb-3">
                    <div class="flex items-center gap-3">
                        <div class="text-xs font-bold text-slate-300 w-4">2</div>
                        <div>
                            <h3 class="text-sm font-semibold text-slate-800">Ali Raza</h3>
                            <p class="text-[11px] text-slate-400">Muhammad Raza</p>
                        </div>
                    </div>
                    <div class="flex gap-2 sm:gap-4">
                        <div class="status-box present" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box absent active" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box late" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box leave" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    </div>
                </div>

                <div class="flex items-center justify-between pb-2">
                    <div class="flex items-center gap-3">
                        <div class="text-xs font-bold text-slate-300 w-4">3</div>
                        <div>
                            <h3 class="text-sm font-semibold text-slate-800">Muhammad Usama</h3>
                            <p class="text-[11px] text-slate-400">Abdul Khan</p>
                        </div>
                    </div>
                    <div class="flex gap-2 sm:gap-4">
                        <div class="status-box present" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box absent" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box late active" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                        <div class="status-box leave" onclick="selectStatus(this)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function selectStatus(clickedElement) {
            // Find the parent row
            let row = clickedElement.parentElement;
            
            // Remove 'active' class from all boxes in this row
            let boxes = row.querySelectorAll('.status-box');
            boxes.forEach(box => box.classList.remove('active'));
            
            // Add 'active' class to the clicked box
            clickedElement.classList.add('active');
        }
    </script>
</body>
</html>
