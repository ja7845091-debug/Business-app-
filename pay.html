<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آٹو فیس ویریفکیشن سسٹم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;}
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1f2937; margin-bottom: 20px; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #4b5563; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input[type="file"] { border: 1px dashed #3b82f6; background: #eff6ff; padding: 10px; cursor: pointer; }
        .btn { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .btn:disabled { background-color: #93c5fd; cursor: not-allowed; }
        .loader { text-align: center; color: #d97706; font-weight: bold; display: none; margin-top: 15px; font-size: 14px;}
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; font-size: 16px; line-height: 1.5;}
        .verified { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .rejected { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎓 سٹوڈنٹ ایڈمیشن فارم</h2>
    
    <form id="admissionForm" onsubmit="submitForm(event)">
        <div class="form-group">
            <label>طالب علم کا نام</label>
            <input type="text" id="name" required placeholder="نام لکھیں">
        </div>

        <div class="form-group">
            <label>Transaction ID (TID)</label>
            <input type="text" id="tid" required placeholder="مثلاً: 11223344556">
        </div>

        <div class="form-group">
            <label>Payment Receipt (سکرین شاٹ)</label>
            <input type="file" id="receipt" accept="image/*" required>
        </div>

        <button type="submit" id="submitBtn" class="btn">فارم اور فیس جمع کروائیں</button>
    </form>

    <div id="loading" class="loader">⏳ سسٹم آپ کی رسید کو بینک (Google Sheet) سے میچ کر رہا ہے...</div>
    <div id="resultBox" class="result"></div>
</div>

<script>
    async function submitForm(event) {
        event.preventDefault(); // پیج کو ریفریش ہونے سے روکنا

        let tid = document.getElementById("tid").value.trim();
        let btn = document.getElementById("submitBtn");
        let loader = document.getElementById("loading");
        let resultBox = document.getElementById("resultBox");

        // لوڈنگ شروع
        btn.disabled = true;
        resultBox.style.display = "none";
        loader.style.display = "block";

        try {
            // 🌟 یہ آپ کا اپنا لائیو تیار کردہ API لنک ہے!
            let API_URL = "https://script.google.com/macros/s/AKfycbwe3_icxcKHUzfphWjUpfesqR1B7-dtuZkjg5Fjgy0GoAWASIZyl6QYHy24Lw42e-Q/exec";

            // فرنٹ اینڈ سے ڈیٹا آپ کی گوگل شیٹ کو بھیجا جا رہا ہے
            let response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ tid: tid })
            });

            let data = await response.json();

            // لوڈنگ ختم
            loader.style.display = "none";
            resultBox.style.display = "block";
            btn.disabled = false;

            // جواب کے مطابق سکرین پر میسج دکھانا
            if (data.verified === true) {
                resultBox.className = "result verified";
                resultBox.innerHTML = data.message;
            } else {
                resultBox.className = "result rejected";
                resultBox.innerHTML = data.message;
            }

        } catch (error) {
            // اگر انٹرنیٹ کا مسئلہ ہو
            loader.style.display = "none";
            resultBox.style.display = "block";
            btn.disabled = false;
            resultBox.className = "result rejected";
            resultBox.innerHTML = "❌ سرور سے رابطہ نہیں ہو سکا۔ انٹرنیٹ چیک کریں!";
        }
    }
</script>

</body>
</html>
