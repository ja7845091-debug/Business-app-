<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School ERP - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 320px; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>School ERP</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="message" style="color: red; font-size: 14px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // آپ کا فائر بیس کنکشن 
        const firebaseConfig = {
          apiKey: "AIzaSyB4KJ4e2PgJlVfoRjtMIgEGZ5JURPaxsT8",
          authDomain: "smart-school-erp-1a70c.firebaseapp.com",
          projectId: "smart-school-erp-1a70c",
          storageBucket: "smart-school-erp-1a70c.firebasestorage.app",
          messagingSenderId: "550372576694",
          appId: "1:550372576694:web:622c5302b31e457b0f8517"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Login Button Action
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if(email === "" || password === "") {
                msg.innerText = "براہ کرم ای میل اور پاس ورڈ درج کریں!";
                return;
            }

            msg.style.color = "blue";
            msg.innerText = "لاگ ان ہو رہا ہے...";

            signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                msg.style.color = "green";
                msg.innerText = "لاگ ان کامیاب!";
            })
            .catch((error) => {
                msg.style.color = "red";
                msg.innerText = "ایرر: " + error.message;
            });
        });
    </script>
</body>
</html>
