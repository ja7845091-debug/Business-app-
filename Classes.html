        <div class="p-6 max-w-4xl mx-auto w-full space-y-6">
            
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Manage Classes</h1>
                <p class="text-slate-500 text-sm mt-1">Add or remove classes in your school</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-end">
                <div class="w-full md:w-2/3">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-2">New Class Name</label>
                    <input type="text" id="newClassName" placeholder="e.g. 9th Science, 10th Arts" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-400 transition">
                </div>
                <button onclick="addClass()" class="w-full md:w-1/3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl px-6 py-3 transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Class
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                    <h3 class="font-bold text-slate-800">Active Classes</h3>
                </div>
                
                <ul id="classesList" class="divide-y divide-slate-100">
                    </ul>
            </div>

        </div>
    </main>

    <script>
        // Default Classes Data
        let schoolClasses = [
            { id: 1, name: "Class 6th", students: 30 },
            { id: 2, name: "Class 7th", students: 28 },
            { id: 3, name: "Class 8th", students: 35 }
        ];

        // Function to display classes on the screen
        function renderClasses() {
            const listElement = document.getElementById('classesList');
            listElement.innerHTML = ''; // Clear old list

            if(schoolClasses.length === 0) {
                listElement.innerHTML = `<li class="p-6 text-center text-slate-400">No classes added yet.</li>`;
                return;
            }

            schoolClasses.forEach((cls, index) => {
                listElement.innerHTML += `
                    <li class="p-4 px-6 flex items-center justify-between hover:bg-slate-50 transition">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center font-bold text-lg">
                                🏫
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800 text-md">${cls.name}</h4>
                                <p class="text-xs text-slate-400 mt-0.5">${cls.students} Students Enrolled</p>
                            </div>
                        </div>
                        <button onclick="removeClass(${index})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition" title="Delete Class">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </li>
                `;
            });
        }

        // Function to add a new class
        function addClass() {
            const inputField = document.getElementById('newClassName');
            const className = inputField.value.trim();

            if (className === "") {
                alert("Please enter a class name first!");
                return;
            }

            // Add to array
            schoolClasses.push({
                id: Date.now(),
                name: className,
                students: 0 // New class has 0 students initially
            });

            // Clear input and update screen
            inputField.value = '';
            renderClasses();
        }

        // Function to remove a class
        function removeClass(index) {
            const confirmDelete = confirm(`Are you sure you want to delete ${schoolClasses[index].name}?`);
            if (confirmDelete) {
                schoolClasses.splice(index, 1); // Remove from array
                renderClasses(); // Update screen
            }
        }

        // Load classes when page opens
        window.onload = renderClasses;
    </script>
