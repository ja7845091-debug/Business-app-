<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Govt HSS Kaghan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap'); /* For Urdu text */
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .urdu-text {
            font-family: 'Noto Nastaliq Urdu', serif;
        }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <nav class="bg-white border-b border-slate-100 px-4 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            <span class="font-semibold text-lg tracking-tight">Govt HSS Kaghan</span>
        </div>
        <div class="flex items-center gap-4">
            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </div>
    </nav>

    <div class="px-5 mt-6">
        <h1 class="text-3xl font-bold text-slate-900">Students</h1>
        <p class="text-slate-500 mt-1 text-sm">144 students enrolled</p>

        <div class="flex gap-3 mt-6">
            <button class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 text-white font-semibold text-sm rounded-xl shadow-sm hover:bg-emerald-700 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export Excel
            </button>
            <button onclick="openAddStudentModal()" class="flex items-center gap-2 px-5 py-2.5 bg-slate-500 text-white font-semibold text-sm rounded-xl shadow-sm hover:bg-slate-600 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add Student
            </button>
        </div>

        <div class="mt-6 flex flex-col gap-3">
            <div class="relative">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" placeholder="Search students..." class="w-full bg-white border border-slate-200 text-slate-700 rounded-xl pl-11 pr-4 py-3 outline-none focus:border-slate-400">
            </div>
            
            <select class="w-full bg-white border border-slate-200 text-slate-700 rounded-xl px-4 py-3 outline-none focus:border-slate-400 appearance-none">
                <option value="">All Classes</option>
                <option value="6th">Class 6th</option>
                <option value="7th">Class 7th</option>
                <option value="8th">Class 8th</option>
            </select>
        </div>

        <div class="flex text-[10px] font-bold text-slate-400 uppercase tracking-wider mt-8 mb-2 px-2">
            <div class="w-1/2">Student Name</div>
            <div class="w-1/2 text-right">Father's Name</div>
        </div>

        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden flex flex-col">
            
            <div class="flex items-center justify-between p-4 border-b border-slate-50 hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold text-lg">
                        J
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800">Jawad Ahmad</h3>
                        <p class="text-[11px] text-slate-400 urdu-text mt-0.5">جواد احمد</p>
                    </div>
                </div>
                <div class="text-right">
                    <h3 class="text-sm font-medium text-slate-600">Sajjad Ahmad</h3>
                    <p class="text-xs text-slate-400 mt-0.5">0300-XXXXXXX</p>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 border-b border-slate-50 hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold text-lg">
                        A
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800">Ali Raza</h3>
                        <p class="text-[11px] text-slate-400 urdu-text mt-0.5">علی رضا</p>
                    </div>
                </div>
                <div class="text-right">
                    <h3 class="text-sm font-medium text-slate-600">Muhammad Raza</h3>
                    <p class="text-xs text-slate-400 mt-0.5">0311-XXXXXXX</p>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold text-lg">
                        U
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800">Muhammad Usama</h3>
                        <p class="text-[11px] text-slate-400 urdu-text mt-0.5">محمد اسامہ</p>
                    </div>
                </div>
                <div class="text-right">
                    <h3 class="text-sm font-medium text-slate-600">Abdul Khan</h3>
                    <p class="text-xs text-slate-400 mt-0.5">0345-XXXXXXX</p>
                </div>
            </div>

        </div>
    </div>


    <div id="studentModal" class="fixed inset-0 bg-slate-900 bg-opacity-40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 transform translate-y-full sm:translate-y-0 transition-transform duration-300 shadow-2xl" id="modalContent">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Add New Student</h2>
                <button onclick="closeAddStudentModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Student Name</label>
                    <input type="text" placeholder="e.g. Bilal Khan" class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-400">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Father's Name</label>
                    <input type="text" placeholder="e.g. Abdul Khan" class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-400">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Class</label>
                        <select class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-400">
                            <option>6th</option>
                            <option>7th</option>
                        </select>
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Roll No</label>
                        <input type="number" placeholder="e.g. 1" class="mt-1 w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-400">
                    </div>
                </div>
                
                <button class="w-full mt-4 bg-slate-800 text-white font-semibold rounded-xl py-3.5 hover:bg-slate-900 transition">
                    Save Student Data
                </button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('studentModal');
        const modalContent = document.getElementById('modalContent');

        function openAddStudentModal() {
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('translate-y-full');
        }

        function closeAddStudentModal() {
            modalContent.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('opacity-0', 'pointer-events-none');
            }, 300); // Wait for slide down animation before hiding background
        }
    </script>
</body>
</html>
