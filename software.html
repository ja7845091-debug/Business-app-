<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Verifier (Mobile Jugaad)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 22px;
        }
        h3 {
            color: #0056b3;
            font-size: 18px;
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }
        label {
            font-size: 14px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .btn-save { background-color: #007bff; }
        .btn-verify { background-color: #28a745; }
        .btn-clear { background-color: #dc3545; margin-top: 10px; }
        .message {
            margin-top: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Fee Verifier App</h2>

    <div class="card">
        <h3>1. Bank Record Save Karein</h3>
        <label>Bank se aayi hui TID (Transaction ID)</label>
        <input type="text" id="adminTid" placeholder="e.g. 12345678901">
        
        <label>Kitni Fee aayi hai? (Amount)</label>
        <input type="number" id="adminAmount" placeholder="e.g. 5000">
        
        <button class="btn-save" onclick="saveBankRecord()">Save Record</button>
        <div id="saveMsg" class="message"></div>
    </div>

    <div class="card">
        <h3>2. Student Fee Verify Karein</h3>
        <label>Student ki bheji hui TID yahan likhein</label>
        <input type="text" id="studentTid" placeholder="Student's TID">
        
        <button class="btn-verify" onclick="verifyStudentFee()">Verify Fee</button>
        <div id="verifyMsg" class="message"></div>
    </div>

    <div class="card" style="text-align: center;">
        <p style="font-size: 12px; color: #777;">System ka sara record delete karne ke liye niche click karein (Careful!)</p>
        <button class="btn-clear" onclick="clearAllData()">Format System</button>
    </div>
</div>

<script>
    // Mobile ki memory se purana data nikalna
    let feeDatabase = JSON.parse(localStorage.getItem('feeData')) || {};

    // Record save karne ka function
    function saveBankRecord() {
        let tid = document.getElementById('adminTid').value.trim();
        let amount = document.getElementById('adminAmount').value.trim();
        let msgBox = document.getElementById('saveMsg');

        if (!tid || !amount) {
            msgBox.innerHTML = "<span class='error'>❌ TID aur Amount dono likhein!</span>";
            return;
        }

        // Agar TID pehle se majood hai
        if (feeDatabase[tid]) {
            msgBox.innerHTML = "<span class='warning'>⚠️ Yeh TID pehle se save hai!</span>";
            return;
        }

        // Data ko unused status ke sath save karna
        feeDatabase[tid] = { amount: amount, status: 'unused' };
        localStorage.setItem('feeData', JSON.stringify(feeDatabase));

        msgBox.innerHTML = "<span class='success'>✅ Record Mobile mein Save ho gaya!</span>";
        document.getElementById('adminTid').value = '';
        document.getElementById('adminAmount').value = '';
        
        // 3 second baad message gayab kar dena
        setTimeout(() => msgBox.innerHTML = '', 3000);
    }

    // Verify karne ka function
    function verifyStudentFee() {
        let tid = document.getElementById('studentTid').value.trim();
        let msgBox = document.getElementById('verifyMsg');

        if (!tid) {
            msgBox.innerHTML = "<span class='error'>❌ Student ki TID likhein!</span>";
            return;
        }

        // Check karna ke TID system mein hai ya nahi
        if (feeDatabase[tid]) {
            if (feeDatabase[tid].status === 'unused') {
                // Agar unused hai toh use "used" kar do aur verify kar do
                feeDatabase[tid].status = 'used';
                localStorage.setItem('feeData', JSON.stringify(feeDatabase));
                
                msgBox.innerHTML = `<span class='success'>✅ VERIFIED! Amount: Rs. ${feeDatabase[tid].amount}<br>Yeh TID ab 'Used' mark ho gayi hai.</span>`;
            } else {
                // Agar pehle use ho chuki hai
                msgBox.innerHTML = "<span class='error'>⛔ FAKE ALERT: Yeh TID pehle hi kisi aur student ne use kar li hai!</span>";
            }
        } else {
            // Agar TID record mein nahi hai
            msgBox.innerHTML = "<span class='error'>❌ NOT FOUND: Yeh TID aapke Bank Record mein nahi hai. Invalid!</span>";
        }
    }

    // Pura data clear karne ka function
    function clearAllData() {
        if (confirm("Kya aap waqai sara record delete karna chahte hain?")) {
            localStorage.removeItem('feeData');
            feeDatabase = {};
            alert("Sara Data clear ho gaya!");
        }
    }
</script>

</body>
</html>
